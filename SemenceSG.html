<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Semence Mâles SG</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a1520;
    font-family: 'Courier New', monospace;
    color: #c8d8e8;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(135deg, #0d1e2e, #122033);
    border-bottom: 2px solid #1e4060;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
  }
  .header-title-sub { font-size: 10px; color: #4a8cb0; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-size: 20px; font-weight: 700; color: #e8f4ff; letter-spacing: 1px; }
  .header-logo { height: 48px; width: auto; filter: drop-shadow(0 0 4px rgba(80,140,255,0.3)); }
  .header-brand { display: flex; align-items: center; gap: 14px; }
  .header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input[type=date] {
    background: #1a2e42; border: 1px solid #2a4a68; border-radius: 6px;
    color: #c8d8e8; padding: 8px 12px; font-family: inherit; font-size: 14px; cursor: pointer;
  }
  .btn-bilan {
    background: #1a3a5c; border: 1px solid #2a5a8c; border-radius: 6px;
    color: #7ab8e0; padding: 8px 14px; font-family: inherit; font-size: 11px;
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  }
  .btn-bilan:hover { filter: brightness(1.2); }
  #saving { font-size: 11px; color: #4a8cb0; }
  .taux-global {
    background: #0d1a28; border: 1px solid #1a3048; border-radius: 6px;
    padding: 5px 10px; font-family: inherit; font-size: 12px;
    font-weight: 700; letter-spacing: 0.5px; white-space: nowrap;
  }
  .layout { display: flex; min-height: calc(100vh - 80px); overflow: hidden; }
  nav {
    width: 52px; background: #0d1a28; border-right: 2px solid #1a3048;
    display: flex; flex-direction: column; padding-top: 12px; gap: 2px; flex-shrink: 0; overflow-y: auto;
  }
  .allee-btn {
    background: transparent; border: none; border-left: 3px solid transparent;
    color: #4a6a8a; font-family: inherit; font-weight: 700; font-size: 16px;
    padding: 13px 0; cursor: pointer; transition: all 0.15s; letter-spacing: 1px; width: 100%;
  }
  .allee-btn.active { background: #1a4a7a; border-left-color: #3a8cc8; color: #e8f4ff; }
  .allee-btn:hover:not(.active) { color: #7ab8e0; }
  main { flex: 1; padding: 18px; overflow-y: auto; }
  .main-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .allee-title { font-size: 26px; font-weight: 700; color: #e8f4ff; letter-spacing: 2px; }
  .allee-title span { color: #3a8cc8; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-box {
    background: #0d1a28; border: 1px solid #1a3048; border-radius: 8px;
    padding: 7px 12px; text-align: center;
  }
  .stat-val { font-size: 18px; font-weight: 700; }
  .stat-val span { font-size: 12px; font-weight: 400; opacity: 0.8; }
  .stat-lbl { font-size: 9px; color: #4a6a8a; letter-spacing: 1px; text-transform: uppercase; }
  .progress-wrap { display: flex; background: #1a2e42; border-radius: 4px; height: 6px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; transition: width 0.3s; }
  .legend { display: flex; gap: 16px; margin-bottom: 14px; font-size: 11px; color: #4a6a8a; letter-spacing: 1px; flex-wrap: wrap; align-items: center; }
  .grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 5px;
    max-width: 680px;
  }

  /* ---- CAGES ---- */
  .cage {
    background: #1e2a35; border: 1.5px solid #2a3a4a; border-radius: 6px;
    color: #4a6070; font-family: inherit; font-weight: 700;
    padding: 9px 4px 5px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: all 0.12s; user-select: none; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .cage:hover:not(.femelle) { filter: brightness(1.2); }
  .cage .icon { font-size: 15px; }
  .cage .lbl { font-size: 9px; opacity: 1; font-weight: 800; color: #ffffff; letter-spacing: 0.5px; }

  .cage.donne    { background: #0d3d1f; border-color: #16a34a; color: #4ade80; }
  .cage.nondonne { background: #3d0d0d; border-color: #dc2626; color: #f87171; }

  /* Vide : cage sans mâle */
  .cage.vide {
    background: #1a1a2e; border-color: #3a3a5a; color: #6a6a8a;
    opacity: 0.6;
  }
  .cage.vide .icon { font-size: 8px; letter-spacing: 1px; }

  /* Femelles : rayures diagonales, non cliquable */
  .cage.femelle {
    cursor: not-allowed;
    background: repeating-linear-gradient(
      45deg,
      #0f1e2e 0px, #0f1e2e 4px,
      #1a2e42 4px, #1a2e42 9px
    );
    border-color: #1a3a5a;
    color: #2a5070;
    opacity: 0.75;
  }
  .cage.femelle .icon { font-size: 12px; }

  .quick-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .qa-btn {
    border: 1px solid; border-radius: 6px; font-family: inherit;
    font-size: 11px; padding: 8px 14px; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase;
  }
  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #0d1e2e; border: 2px solid #1e4060; border-radius: 12px;
    padding: 24px; min-width: 500px; max-width: 700px; max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 12px; color: #4a8cb0; letter-spacing: 2px; margin-bottom: 14px; text-transform: uppercase; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: #4a8cb0; border-bottom: 1px solid #1e3a50; padding: 6px 7px; text-align: center; }
  th:first-child { text-align: left; }
  td { padding: 7px 7px; text-align: center; border-bottom: 1px solid #0f2030; }
  td:first-child { text-align: left; font-weight: 700; color: #7ab8e0; }
  tr.total-row td { border-top: 2px solid #1e4060; font-weight: 700; }
  .btn-close {
    margin-top: 18px; width: 100%; background: #1a3a5c; border: 1px solid #2a5a8c;
    border-radius: 6px; color: #7ab8e0; padding: 10px; font-family: inherit;
    font-size: 12px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  }
  .ldot {
    display: inline-block; width: 10px; height: 10px; border-radius: 2px;
    margin-right: 4px; vertical-align: middle;
  }
  .tubes-box {
    background: #0d1a28; border: 1px solid #1e4060; border-radius: 8px;
    padding: 7px 12px; display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .tubes-box label { font-size: 10px; color: #4a8cb0; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .tubes-input {
    background: #1a2e42; border: 1px solid #3a8cc8; border-radius: 5px;
    color: #e8f4ff; padding: 4px 8px; font-family: inherit; font-size: 15px;
    font-weight: 700; width: 80px; text-align: center;
  }
  .tubes-input:focus { outline: none; border-color: #5ab8f0; }

  /* ===== RESPONSIVE MOBILE ===== */
  @media (max-width: 640px) {

    /* ----- Header ----- */
    header {
      padding: 8px 10px;
      gap: 6px;
    }
    .header-title { font-size: 14px; }
    .header-logo { height: 32px; }
    .header-brand { gap: 8px; }
    .header-right {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    input[type=date] {
      font-size: 12px;
      padding: 5px 7px;
      flex: 1 1 120px;
    }
    .btn-bilan {
      font-size: 10px;
      padding: 5px 8px;
    }
    #saving { font-size: 10px; }
    .taux-global { font-size: 10px; padding: 4px 7px; }

    /* ----- Layout : abandon hauteur fixe, page normale ----- */
    .layout {
      display: block !important;
      height: auto !important;
      min-height: unset !important;
    }

    /* ----- Nav allées : bandeau horizontal ----- */
    nav {
      width: 100% !important;
      height: auto !important;
      flex-direction: row !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      border-right: none !important;
      border-bottom: 2px solid #1a3048 !important;
      padding: 6px 4px !important;
      gap: 2px !important;
      -webkit-overflow-scrolling: touch;
      display: flex !important;
    }
    .allee-btn {
      border-left: none !important;
      border-bottom: 3px solid transparent;
      padding: 8px 14px;
      font-size: 15px;
      white-space: nowrap;
      flex-shrink: 0;
      width: auto !important;
    }
    .allee-btn.active {
      border-left: none !important;
      border-bottom-color: #3a8cc8 !important;
      background: #1a4a7a !important;
    }

    /* ----- Contenu principal : scroll naturel ----- */
    main {
      display: block !important;
      height: auto !important;
      overflow: visible !important;
      padding: 12px 8px !important;
    }

    /* ----- Stats ----- */
    .main-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
    }
    .allee-title { font-size: 20px; }
    .stats { gap: 5px; flex-wrap: wrap; }
    .stat-box { padding: 5px 8px; }
    .stat-val { font-size: 14px; }
    .stat-lbl { font-size: 8px; }

    /* ----- Légende ----- */
    .legend { font-size: 10px; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

    /* ----- Grille cages ----- */
    .grid {
      display: grid !important;
      grid-template-columns: repeat(9, 1fr) !important;
      gap: 3px !important;
      max-width: 100% !important;
      width: 100% !important;
    }
    .cage {
      padding: 7px 2px 4px !important;
      border-radius: 4px !important;
      min-height: 38px !important;
    }
    .cage .icon { font-size: 12px !important; }
    .cage .lbl { font-size: 7px !important; }
    .cage.femelle .icon { font-size: 10px !important; }

    /* ----- Boutons actions rapides ----- */
    .quick-actions { gap: 6px; margin-top: 14px; flex-wrap: wrap; }
    .qa-btn { font-size: 10px; padding: 6px 10px; }

    /* ----- Modal ----- */
    .modal {
      min-width: unset !important;
      width: 96vw !important;
      max-width: 96vw !important;
      padding: 14px 12px !important;
      max-height: 88vh !important;
    }
    table { font-size: 11px; }
    th, td { padding: 5px 3px; }
    .btn-close { padding: 8px; font-size: 11px; }
  }

  @media (max-width: 380px) {
    .cage { min-height: 34px !important; }
    .cage .icon { font-size: 11px !important; }
    .cage .lbl { font-size: 6px !important; }
    .btn-bilan { font-size: 9px; padding: 4px 6px; }
  }
</style>

// -------- Sauvegarde cages vides (persistant) --------
function saveCagesVides(allee) {
  const arr = Array.from(cagesVides[allee] || []);
  try { localStorage.setItem(lsKeyVides(allee), JSON.stringify(arr)); } catch(e) {}
  if (firebaseOK) {
    db.ref(fbPathVides(allee)).set(arr).catch(() => {});
  }
}

async function loadCagesVides(allee) {
  if (firebaseOK) {
    try {
      const snap = await db.ref(fbPathVides(allee)).get();
      if (snap.exists()) {
        const arr = snap.val();
        cagesVides[allee] = new Set(Array.isArray(arr) ? arr.map(Number) : []);
        try { localStorage.setItem(lsKeyVides(allee), JSON.stringify(Array.from(cagesVides[allee]))); } catch(e) {}
        return;
      }
    } catch(e) {}
  }
  try {
    const v = localStorage.getItem(lsKeyVides(allee));
    cagesVides[allee] = v ? new Set(JSON.parse(v).map(Number)) : new Set();
  } catch(e) { cagesVides[allee] = new Set(); }
}

async function loadAllCagesVides() {
  await Promise.all(ALLEES.map(al => loadCagesVides(al)));
}

function isCageVide(allee, num) {
  return cagesVides[allee] && cagesVides[allee].has(num);
}

// Couleur du taux d'utilisation : vert à 75%, rouge en s'éloignant
function tauxColor(pct) {
  if (pct === null || isNaN(pct)) return '#4a6a8a';
  // Distance au taux idéal de 75%
  const dist = Math.abs(pct - 75);
  // 0 = parfait (vert), 75 = très éloigné (rouge)
  const ratio = Math.min(dist / 50, 1); // 0..1
  const r = Math.round(22 + ratio * 226);  // 22 → 248
  const g = Math.round(200 - ratio * 130); // 200 → 70
  const b = Math.round(80 - ratio * 50);   // 80 → 30
  return `rgb(${r},${g},${b})`;
}

}

// -------- Sauvegarde --------
function saveAllee(date, allee) {
  const payload = data[allee] || {};
  // Toujours sauvegarder en local (fallback)
  try { localStorage.setItem(lsKey(date, allee), JSON.stringify(payload)); } catch(e) {}
  // Sauvegarder sur Firebase si configuré
  if (firebaseOK) {
    db.ref(fbPath(date, allee)).set(payload)
      .then(() => showSaving('☁️ sauvegardé'))
      .catch(() => showSaving('💾 local'));
  } else {
    showSaving('💾 local');
  }
}

// -------- Sauvegarde tubes --------
function saveTubes(date, allee) {
  const val = tubesData[allee] !== undefined ? tubesData[allee] : '';
  try { localStorage.setItem(lsKeyTubes(date, allee), String(val)); } catch(e) {}
  if (firebaseOK) {
    db.ref(fbPathTubes(date, allee)).set(val).catch(() => {});
  }
}

async function loadTubes(date, allee) {
  if (firebaseOK) {
    try {
      const snap = await db.ref(fbPathTubes(date, allee)).get();
      tubesData[allee] = snap.exists() ? parseFloat(snap.val()) : '';
      if (!isNaN(tubesData[allee])) try { localStorage.setItem(lsKeyTubes(date, allee), String(tubesData[allee])); } catch(e) {}
      return;
    } catch(e) {}
  }
  try {
    const v = localStorage.getItem(lsKeyTubes(date, allee));
    tubesData[allee] = v !== null ? parseFloat(v) : '';
  } catch(e) { tubesData[allee] = ''; }
}

function onTubesChange(val) {
  const parsed = parseFloat(val);
  tubesData[currentAllee] = isNaN(parsed) ? '' : parsed;
  saveTubes(currentDate, currentAllee);
}
async function loadAllee(date, allee) {
  if (firebaseOK) {
    try {
      const snap = await db.ref(fbPath(date, allee)).get();
      data[allee] = snap.exists() ? snap.val() : {};
      // Mettre à jour le cache local

    const v = localStorage.getItem(lsKey(date, allee));

// -------- Stats --------
function getStats(allee) {
  const d = data[allee] || {};
  let donne=0, nonDonne=0, nonEnr=0, vide=0;
  for (let i=1; i<=NB_CAGES; i++) {
    if (FEMELLES.has(i)) continue;
    if (isCageVide(allee, i)) { vide++; continue; }
    const v = d[i] || 0;
    if      (v===1 || v===2) donne++;
    else if (v===3)          nonDonne++;
    else                     nonEnr++;
  }
  const malesActifs = NB_MALES - vide;
  const evalues = donne + nonDonne;
  const pctD = evalues ? Math.round((donne / evalues) * 100) : 0;
  const pctND = evalues ? Math.round((nonDonne / evalues) * 100) : 0;
  return { donne, nonDonne, nonEnr, vide, malesActifs, evalues, pctD, pctND };
}

// -------- Actions cages --------
function toggleCage(num) {
  if (FEMELLES.has(num)) return;
  if (!data[currentAllee]) data[currentAllee] = {};
  
  // Si la cage est actuellement VIDE (persistant) → la remettre en service
  if (isCageVide(currentAllee, num)) {
    cagesVides[currentAllee].delete(num);
    saveCagesVides(currentAllee);
    data[currentAllee][num] = 0;
    saveAllee(currentDate, currentAllee);
    renderMain();
    return;
  }
  
  const cur = data[currentAllee][num] || 0;
  // Cycle: 0 (non enr.) → 1 (donné) → 3 (non donné) → VIDE (persistant) → 0
  if (cur === 3) {
    // Passer en VIDE persistant
    if (!cagesVides[currentAllee]) cagesVides[currentAllee] = new Set();
    cagesVides[currentAllee].add(num);
    saveCagesVides(currentAllee);
    data[currentAllee][num] = 0; // Nettoyer la donnée du jour
  } else {
    data[currentAllee][num] = cur === 0 ? 1 : 3;
  }
  saveAllee(currentDate, currentAllee);
  renderMain();
}

function markAll(val) {
  if (!data[currentAllee]) data[currentAllee] = {};
  if (val === 0) {
    // Réinitialiser : enlever aussi les cages vides
    cagesVides[currentAllee] = new Set();
    saveCagesVides(currentAllee);
  }
  for (let i=1; i<=NB_CAGES; i++) {
    if (!FEMELLES.has(i) && !isCageVide(currentAllee, i)) data[currentAllee][i] = val;
  }
  saveAllee(currentDate, currentAllee);
  renderMain();
}

function markAllVide() {
  if (!cagesVides[currentAllee]) cagesVides[currentAllee] = new Set();
  for (let i=1; i<=NB_CAGES; i++) {
    if (!FEMELLES.has(i)) cagesVides[currentAllee].add(i);
  }
  saveCagesVides(currentAllee);
  renderMain();
}

// -------- Bilan global --------
async function openBilan() {
  // Charger toutes les allées depuis Firebase
  await loadAllCagesVides();
  await Promise.all(ALLEES.map(al => loadAllee(currentDate, al)));
  await Promise.all(ALLEES.map(al => loadTubes(currentDate, al)));
  document.getElementById('modalTitle').textContent = `Bilan du ${currentDate}`;
  let totD=0, totND=0, totNE=0, totV=0, totT=0, totActifs=0, rows='';
  ALLEES.forEach(al => {
    const s = getStats(al);
    const t = tubesData[al] !== undefined && tubesData[al] !== '' ? tubesData[al] : '—';
    totD+=s.donne; totND+=s.nonDonne; totNE+=s.nonEnr; totV+=s.vide; totActifs+=s.malesActifs;
    if (typeof t === 'number') totT += t;
    const taux = s.malesActifs > 0 ? Math.round(s.evalues / s.malesActifs * 100) : 0;
    rows += `<tr>
      <td>${al}</td>
      <td style="color:#4ade80">${s.donne} <span>(${s.pctD}%)</span></td>
      <td style="color:#f87171">${s.nonDonne} <span>(${s.pctND}%)</span></td>
      <td style="color:#4a6a8a">${s.nonEnr}</td>
      <td style="color:#6a6a8a">${s.vide}</td>
      <td style="color:${tauxColor(taux)};font-weight:700">${taux}%</td>
      <td style="color:#7ab8e0">${typeof t === 'number' ? t.toFixed(1) : t}</td>
    </tr>`;
  });
  const totEval = totD + totND;
  const totPctD = totEval ? Math.round((totD/totEval)*100) : 0;
  const totPctND = totEval ? Math.round((totND/totEval)*100) : 0;
  const totTaux = totActifs > 0 ? Math.round(totEval / totActifs * 100) : 0;
  rows += `<tr class="total-row">
    <td style="color:#e8f4ff">TOTAL</td>
    <td style="color:#4ade80">${totD} (${totPctD}%)</td>
    <td style="color:#f87171">${totND} (${totPctND}%)</td>
    <td style="color:#4a6a8a">${totNE}</td>
    <td style="color:#6a6a8a">${totV}</td>
    <td style="color:${tauxColor(totTaux)};font-weight:700">${totTaux}%</td>
    <td style="color:#7ab8e0">${totT.toFixed(1)}</td>
  </tr>`;
  document.getElementById('bilanBody').innerHTML = rows;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeBilan() { document.getElementById('modalOverlay').classList.remove('open'); }

// -------- Réinitialisation journée --------
function resetJournee() {
  document.getElementById('resetDateLabel').textContent = currentDate;
  document.getElementById('resetOverlay').classList.add('open');
}
function closeReset() { document.getElementById('resetOverlay').classList.remove('open'); }

async function confirmReset() {
  closeReset();
  // Réinitialiser en local et Firebase pour toutes les allées
  for (const al of ALLEES) {
    // Cages
    try { localStorage.removeItem(lsKey(currentDate, al)); } catch(e) {}
    // Tubes
    try { localStorage.removeItem(lsKeyTubes(currentDate, al)); } catch(e) {}
    if (firebaseOK) {
      try { await db.ref(fbPath(currentDate, al)).remove(); } catch(e) {}
      try { await db.ref(fbPathTubes(currentDate, al)).remove(); } catch(e) {}
    }
  }
  // Vider les données en mémoire
  data = {};
  tubesData = {};
  showSaving('🗑 Journée réinitialisée');
  renderNav();
  renderMain();
}

    const keys = Object.keys(localStorage).filter(k => k.startsWith('semenceSG:'));
    dates = Array.from(new Set(keys.map(k => k.split(':')[1]))).sort();

      alHdr.push(blk(`${p[2]}/${p[1]}`, di%2===0 ? dateHdrStyle : dateHdrStyleAlt));
    });
    alRows.push(alHdr); ar++;

    // Totaux par date (pour ligne TOTAL bas)
    const totByDate = dates.map(() => ({d:0, nd:0}));

    let alRowIdx = 0;
    for (const al of ALLEES) {
      let totalD=0, totalND=0;
      const dayPcts = [];
      dates.forEach((date, di) => {
        const d2 = allData[date][al] || {};
        let d=0, nd=0;
        for (let i=1;i<=NB_CAGES;i++) {
          if(FEMELLES.has(i)) continue;
          if(isCageVide(al, i)) continue;
          const v=d2[i]||0;
          if(v===1||v===2) d++; else if(v===3) nd++;
        }
        totalD+=d; totalND+=nd;
        totByDate[di].d+=d; totByDate[di].nd+=nd;
        const ev=d+nd;
        dayPcts.push(ev ? Math.round(d/ev*100) : null);
      });
      const ev = totalD+totalND;
      const pct = ev ? Math.round(totalD/ev*100) : null;
      const z = alRowIdx%2;
      const pctStyle = pct===null ? (z?S.nenr1:S.nenr0) :
                       pct>=70    ? (z?S.pctD1:S.pctD0)  :
                       pct>=30    ? (z?S.pctM1:S.pctM0)  :
                                    (z?S.pctND1:S.pctND0);
      const row = [
        blk(al,                         z?S.allee1:S.allee0),
        blk(totalD,                     z?S.don1:S.don0),
        blk(totalND,                    z?S.ndon1:S.ndon0),
        blk(pct!==null ? pct+'%' : '—', pctStyle),
      ];
      dayPcts.forEach(p2 => {
        const ps = p2===null ? (z?S.nenr1:S.nenr0) :
                   p2>=70   ? (z?S.pctD1:S.pctD0)  :
                   p2>=30   ? (z?S.pctM1:S.pctM0)  :
                               (z?S.pctND1:S.pctND0);
        row.push(blk(p2!==null ? p2+'%' : '—', ps));
      });
      alRows.push(row); ar++; alRowIdx++;
    }

    // Ligne TOTAL
    const totD = totByDate.reduce((s,v)=>s+v.d,0);
    const totND = totByDate.reduce((s,v)=>s+v.nd,0);
    const totEv = totD+totND;
    const totPct = totEv ? Math.round(totD/totEv*100) : null;
    const totRow = [
      blk("TOTAL", S.totalLbl),
      blk(totD,    S.totalD),
      blk(totND,   S.totalND),
      blk(totPct!==null ? totPct+'%' : '—', S.totalD),
    ];
    totByDate.forEach(v => {
      const ev2=v.d+v.nd;
      const p2=ev2?Math.round(v.d/ev2*100):null;
      totRow.push(blk(p2!==null ? p2+'%' : '—', S.totalD));
    });
    alRows.push(totRow); ar++;

    // ─── SECTION A2 : SUIVI MÂLES / TUBES ──────────
    spacerRow(); spacerRow();

    // Titre section tubes
    const tubeTitleStyle = { font:{bold:true,sz:12,color:{rgb:"FFFFFF"},name:"Calibri"}, fill:{fgColor:{rgb:"0D4A6A"}}, alignment:{horizontal:"left",vertical:"center"}, border:borderMedium("3A8CC8") };
    alRows.push(padRow(blk("🧪  RENDEMENT TUBES — Mâles donneurs par tube (Mâles donneurs ÷ Tubes récoltés)", tubeTitleStyle), NC_MAX));
    alMerges.push({s:{r:ar,c:0},e:{r:ar,c:NC_MAX-1}}); ar++;
    alRows.push(padRow(blk("ℹ  Ratio = Mâles donneurs ÷ Tubes récoltés", S.mainTitle2), NC_MAX));
    alMerges.push({s:{r:ar,c:0},e:{r:ar,c:NC_MAX-1}}); ar++;

    // Styles spécifiques tubes
    const styTubeHdr   = { font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Calibri"}, fill:{fgColor:{rgb:"0D4A6A"}}, alignment:{horizontal:"center",vertical:"center",wrapText:true}, border:borderMedium("3A8CC8") };
    const styRatioHdr  = { font:{bold:true,sz:10,color:{rgb:"FFFFFF"},name:"Calibri"}, fill:{fgColor:{rgb:"164E63"}}, alignment:{horizontal:"center",vertical:"center",wrapText:true}, border:borderMedium("0E7490") };
    const styTube0     = { font:{bold:true,sz:10,color:{rgb:"0D4A6A"},name:"Calibri"}, fill:{fgColor:{rgb:"E0F2FE"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("7DD3FC") };
    const styTube1     = { font:{bold:true,sz:10,color:{rgb:"0D4A6A"},name:"Calibri"}, fill:{fgColor:{rgb:"BAE6FD"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("38BDF8") };
    const styRatioGood0= { font:{bold:true,sz:10,color:{rgb:"166534"},name:"Calibri"}, fill:{fgColor:{rgb:"DCFCE7"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("86EFAC") };
    const styRatioGood1= { font:{bold:true,sz:10,color:{rgb:"166534"},name:"Calibri"}, fill:{fgColor:{rgb:"BBF7D0"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("4ADE80") };
    const styRatioMid0 = { font:{bold:true,sz:10,color:{rgb:"78350F"},name:"Calibri"}, fill:{fgColor:{rgb:"FEF3C7"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("FCD34D") };
    const styRatioMid1 = { font:{bold:true,sz:10,color:{rgb:"78350F"},name:"Calibri"}, fill:{fgColor:{rgb:"FDE68A"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("F59E0B") };
    const styRatioBad0 = { font:{bold:true,sz:10,color:{rgb:"991B1B"},name:"Calibri"}, fill:{fgColor:{rgb:"FEE2E2"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("FCA5A5") };
    const styRatioBad1 = { font:{bold:true,sz:10,color:{rgb:"991B1B"},name:"Calibri"}, fill:{fgColor:{rgb:"FECACA"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("F87171") };
    const styNaTube0   = { font:{sz:10,color:{rgb:"475569"},name:"Calibri"}, fill:{fgColor:{rgb:"F8FAFC"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("CBD5E1") };
    const styNaTube1   = { font:{sz:10,color:{rgb:"475569"},name:"Calibri"}, fill:{fgColor:{rgb:"F1F5F9"}}, alignment:{horizontal:"center",vertical:"center"}, border:border("94A3B8") };

    // Colonnes : Allée | <par date: 🧪 tubes | ♂ donneurs | ♂/tube>
    const tubeHdr = [ blk("Allée", styTubeHdr) ];
    dates.forEach((d,di) => {
      const p = d.split('-');
      const lbl = `${p[2]}/${p[1]}`;
      tubeHdr.push(blk(`🧪 ${lbl}`,  di%2===0 ? dateHdrStyle : dateHdrStyleAlt));
      tubeHdr.push(blk(`♂ ${lbl}`,   styTubeHdr));
      tubeHdr.push(blk(`♂/tube ${lbl}`, styRatioHdr));
    });
    alRows.push(tubeHdr); ar++;

    // Totaux par date pour ligne TOTAL
    const datesTubesTot = dates.map(() => ({tubes:0, don:0}));

    let tbRowIdx = 0;
    for (const al of ALLEES) {
      const z = tbRowIdx % 2;
      const row = [blk(al, z?S.allee1:S.allee0)];

      dates.forEach((date, di) => {
        const tb  = allTubes[date][al];
        const tbVal = (typeof tb === 'number' && !isNaN(tb)) ? tb : null;
        const d2  = allData[date][al] || {};
        let don = 0;
        for (let i=1; i<=NB_CAGES; i++) {
          if(FEMELLES.has(i)) continue;
          if(isCageVide(al, i)) continue;
          const v = d2[i]||0;
          if(v===1||v===2) don++;
        }
        if (tbVal !== null) datesTubesTot[di].tubes += tbVal;
        datesTubesTot[di].don += don;

        // ratio : mâles donneurs / tubes
        const ratio = (tbVal !== null && tbVal > 0) ? (don / tbVal) : null;
        const getRatioSty = (r) => {
          if (r === null) return z ? styNaTube1 : styNaTube0;
          if (r < 12)  return z ? styRatioGood1 : styRatioGood0;
          if (r <= 15) return z ? styRatioMid1  : styRatioMid0;
          return z ? styRatioBad1 : styRatioBad0;
        };
        row.push(blk(tbVal !== null ? tbVal.toFixed(1) : '—', tbVal !== null ? (z?styTube1:styTube0) : (z?styNaTube1:styNaTube0)));
        row.push(blk(don > 0 ? don : '—',                      z?S.don1:S.don0));
        row.push(blk(ratio !== null ? ratio.toFixed(1) : '—',  getRatioSty(ratio)));
      });

      alRows.push(row); ar++; tbRowIdx++;
    }

    // Ligne TOTAL
    const totTubeRow = [ blk("TOTAL", S.totalLbl) ];
    datesTubesTot.forEach(v => {
      const r = (v.tubes > 0) ? (v.don / v.tubes) : null;
      totTubeRow.push(blk(v.tubes > 0 ? v.tubes.toFixed(1) : '—', S.totalTubes));
      totTubeRow.push(blk(v.don > 0 ? v.don : '—',                 S.totalD));
      totTubeRow.push(blk(r !== null ? r.toFixed(1) : '—',          S.totalTubes));
    });
    alRows.push(totTubeRow); ar++;

    // Légende couleur ratio
    spacerRow();
    const legendTubeStyle = { font:{sz:9,color:{rgb:"4A8CB0"},name:"Calibri"}, fill:{fgColor:{rgb:"0A1520"}}, alignment:{horizontal:"left",vertical:"center"} };
    alRows.push(padRow(blk("Ratio ♂/tube :   🟢 < 12 mâles/tube (excellent)   🟡 12 → 15 (correct)   🔴 > 15 (faible rendement collectif)", legendTubeStyle), NC_MAX));
    alMerges.push({s:{r:ar,c:0},e:{r:ar,c:NC_MAX-1}}); ar++;

    // ─── SECTION A3 : TAUX D'UTILISATION GÉNÉRAL ──────────
    spacerRow(); spacerRow();

    const utilTitleStyle = { font:{bold:true,sz:12,color:{rgb:"FFFFFF"},name:"Calibri"}, fill:{fgColor:{rgb:"4A2800"}}, alignment:{horizontal:"left",vertical:"center"}, border:borderMedium("D97706") };
    alRows.push(padRow(blk("📊  TAUX D'UTILISATION — % mâles évalués / mâles actifs (objectif : 75%)", utilTitleStyle), NC_MAX));
    alMerges.push({s:{r:ar,c:0},e:{r:ar,c:NC_MAX-1}}); ar++;

    // En-têtes : Allée | <dates>
    const utilHdr = [ blk("Allée", S.cageHdr) ];
    dates.forEach((d,di) => {
      const p = d.split('-');
      utilHdr.push(blk(`${p[2]}/${p[1]}`, di%2===0 ? dateHdrStyle : dateHdrStyleAlt));
    });
    alRows.push(utilHdr); ar++;

    // Totaux globaux par date pour ligne TOTAL
    const utilTotByDate = dates.map(() => ({eval:0, actifs:0}));

    let utilRowIdx = 0;
    for (const al of ALLEES) {
      const z = utilRowIdx % 2;
      const row = [blk(al, z?S.allee1:S.allee0)];

      dates.forEach((date, di) => {
        const d2 = allData[date][al] || {};
        let ev=0, nbVide=0;
        for (let i=1; i<=NB_CAGES; i++) {
          if(FEMELLES.has(i)) continue;
          if(isCageVide(al, i)){nbVide++;continue;}
          const v = d2[i]||0;
          if(v===1||v===2||v===3) ev++;
        }
        const actifs = NB_MALES - nbVide;
        utilTotByDate[di].eval += ev;
        utilTotByDate[di].actifs += actifs;
        const taux = actifs > 0 ? Math.round(ev / actifs * 100) : 0;
        row.push(blk(taux+'%', tauxStyleXL(taux, z)));
      });

      alRows.push(row); ar++; utilRowIdx++;
    }

    // Ligne TOTAL global
    const utilTotRow = [ blk("TOTAL", S.totalLbl) ];
    utilTotByDate.forEach(v => {
      const taux = v.actifs > 0 ? Math.round(v.eval / v.actifs * 100) : 0;
      utilTotRow.push(blk(taux+'%', tauxStyleTotalXL(taux)));
    });
    alRows.push(utilTotRow); ar++;

    // Légende
    spacerRow();
    const legendUtilLabel = { font:{bold:true,sz:9,color:{rgb:"D97706"},name:"Calibri"}, fill:{fgColor:{rgb:"0A1520"}}, alignment:{horizontal:"left",vertical:"center"} };
    const legendUtilGreen = { font:{bold:true,sz:9,color:{rgb:"16A34A"},name:"Calibri"}, fill:{fgColor:{rgb:"0A1520"}}, alignment:{horizontal:"left",vertical:"center"} };
    const legendUtilRed   = { font:{bold:true,sz:9,color:{rgb:"DC2626"},name:"Calibri"}, fill:{fgColor:{rgb:"0A1520"}}, alignment:{horizontal:"left",vertical:"center"} };
    const legendFill = fill(S.spacer);
    const legendRow = [blk("Objectif : 75% —", legendUtilLabel)];
    // Cellules 1-2 : texte vert mergé
    legendRow.push(blk("● proche de 75% = bon", legendUtilGreen));
    legendRow.push({v:"", s:legendUtilGreen});
    // Cellules 3+ : texte rouge mergé sur le reste
    legendRow.push(blk("● éloigné de 75% = insuffisant ou sur-sollicitation", legendUtilRed));
    for(let li=4; li<NC_MAX; li++) legendRow.push({v:"", s:legendUtilRed});
    alRows.push(legendRow);
    alMerges.push({s:{r:ar,c:1},e:{r:ar,c:2}});
    alMerges.push({s:{r:ar,c:3},e:{r:ar,c:NC_MAX-1}});
    ar++;

    // ─── SECTION B : SUIVI PAR CAGE ────────────────
    spacerRow(); spacerRow();

    // Titre section B
    alRows.push(padRow(blk("📋  DÉTAIL PAR CAGE — classé par taux de don (meilleurs donneurs en haut)", S.dateHdr), NC_MAX));
    alMerges.push({s:{r:ar,c:0},e:{r:ar,c:NC_MAX-1}}); ar++;

    // Colonnes section B : Allée | Cage | Don total | ND total | % Don | <dates>
    const bHdr = [
      blk("Allée",      S.cageHdr),
      blk("Cage",       S.cageHdr),
      blk("✓ Don.",     S.colDonne),
      blk("✗ N.Don.",   S.colNonD),
      blk("% Don",      S.colPctD),
    ];
    dates.forEach((d,di) => {
      const p = d.split('-');
      bHdr.push(blk(`${p[2]}/${p[1]}`, di%2===0 ? dateHdrStyle : dateHdrStyleAlt));
    });
    // On a besoin d'une 6e colonne : insérer en position 5
    alRows.push(bHdr); ar++;

    for (const al of ALLEES) {
      const alleeEntries = [];
      for (let i=1; i<=NB_CAGES; i++) {
        if (FEMELLES.has(i)) continue;
        const isVide = isCageVide(al, i);
        let nbD=0, nbND=0;
        const dayVals = [];
        if (isVide) {
          // Cage vide persistante : toutes les dates = VIDE
          for (const date of dates) { dayVals.push(4); }
        } else {
          for (const date of dates) {
            const val = (allData[date][al]||{})[i]||0;
            if(val===1||val===2){ nbD++; dayVals.push(1); }
            else if(val===3)    { nbND++; dayVals.push(3); }
            else                { dayVals.push(0); }
          }
        }
        const ev = nbD+nbND;
        const pct = ev ? Math.round(nbD/ev*100) : null;
        alleeEntries.push({cage:i, nbD, nbND, pct, dayVals, isVide});
      }
      alleeEntries.sort((a,b) => {
        if(a.pct===null && b.pct===null) return 0;
        if(a.pct===null) return 1;
        if(b.pct===null) return -1;
        return b.pct - a.pct;
      });

      // Bandeau allée
      const alleeBandStyle = { font:{bold:true,sz:11,color:{rgb:"FFFFFF"},name:"Calibri"}, fill:{fgColor:{rgb:"1A3A5C"}}, alignment:{horizontal:"left",vertical:"center"}, border:borderMedium("3A8CC8") };
      alRows.push(padRow(blk(`  Allée ${al}`, alleeBandStyle), NC_MAX));
      alMerges.push({s:{r:ar,c:0},e:{r:ar,c:NC_MAX-1}}); ar++;

      let rowIdx=0;
      for (const e of alleeEntries) {
        const z = rowIdx%2;
        const pctTxt = e.pct!==null ? e.pct+'%' : '—';
        const pctStyle = e.pct===null ? (z?S.nenr1:S.nenr0) :
                         e.pct>=70   ? (z?S.pctD1:S.pctD0)  :
                         e.pct>=30   ? (z?S.pctM1:S.pctM0)  :
                                       (z?S.pctND1:S.pctND0);
        const row = [
          blk(al,      z?S.allee1:S.allee0),
          blk(e.cage,  S.cageNum),
          blk(e.nbD,   z?S.don1:S.don0),
          blk(e.nbND,  z?S.ndon1:S.ndon0),
          blk(pctTxt,  pctStyle),
        ];
        e.dayVals.forEach(v => {
          if     (v===1) row.push(blk("✓", S.cageDon));
          else if(v===3) row.push(blk("✗", S.cageNdon));
          else if(v===4) row.push(blk("VIDE", S.cageNenr));
          else           row.push(blk("—", S.cageNenr));
        });
        alRows.push(row); ar++; rowIdx++;
      }
      spacerRow();
    }

    const wsMales = XLSX.utils.aoa_to_sheet(alRows);
    wsMales['!merges'] = alMerges;
    // Calcul largeur max entre sections (A=4+n, tubes=1+3n, B=5+n)
    const maxCols = Math.max(4 + dates.length, 1 + dates.length*3, 5 + dates.length);
    // Largeurs : on génère autant de colonnes que la plus large des sections
    // Col 0: Allée, Col 1: Don total (ou tubes date1), Col 2: NDon (ou males date1)...
    // On utilise une largeur adaptative : les 5 premières fixes, puis par date
    const colWidths = [
      {wch:9},   // Allée
      {wch:13},  // ✓ Donnés / 🧪 tubes j1 / Cage
      {wch:13},  // ✗ Non don / ♂ donneurs j1 / ✓ Don.
      {wch:10},  // % Don / ♂/tube j1 / ✗ N.Don.
      {wch:10},  // date1 (section A) / — (section B %Don)
    ];
    // Colonnes par date supplémentaires (pour section tubes = 3 cols/date)
    dates.forEach(() => colWidths.push({wch:10}, {wch:13}, {wch:13}));
    wsMales['!cols'] = colWidths;
    wsMales['!rows']   = [{hpt:36},{hpt:18},{hpt:6},{hpt:30}];
    XLSX.utils.book_append_sheet(wb, wsMales, "📈 Suivi Mâles");
  }

  // ══════════════════════════════════════════════════
  //  FEUILLES 3+ — DÉTAIL PAR CAGE (par date)
  // ══════════════════════════════════════════════════
  for (const date of dates.slice(0, 8)) {
    const rows = [];
    const merges = [];
    let dr = 0;

    // Titre
    rows.push([blk(`🦆  SG · Détail par cage · ${date}`, S.mainTitle), ...Array(ALLEES.length).fill(fill(S.mainTitle))]);
    merges.push({s:{r:dr,c:0},e:{r:dr,c:ALLEES.length}}); dr++;

    // En-têtes allées
    const hdr = [blk("Cage N°", S.cageHdr)];
    ALLEES.forEach(al => hdr.push(blk(`Allée ${al}`, S.cageHdr)));
    rows.push(hdr); dr++;

    for (let i=1; i<=NB_CAGES; i++) {
      const row = [];
      if (FEMELLES.has(i)) {
        row.push(blk(`♀ Cage ${i}`, S.cageF));
        ALLEES.forEach(() => row.push(blk("♀ Femelle", S.cageF)));
      } else {
        row.push(blk(i, S.cageNum));
        ALLEES.forEach(al => {
          if (isCageVide(al, i)) {
            row.push(blk("VIDE", S.cageNenr));
          } else {
            const val = (allData[date][al]||{})[i]||0;
            const labels = {0:"— Non enr.",1:"✓ Donné",2:"✓ Donné",3:"✗ Non donné"};
            const styles  = {0:S.cageNenr,1:S.cageDon,2:S.cageDon,3:S.cageNdon};
            row.push(blk(labels[val], styles[val]));
          }
        });
      }
      rows.push(row); dr++;
    }

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    ws['!cols'] = [{wch:9}, ...ALLEES.map(()=>({wch:13}))];
    ws['!rows'] = [{hpt:30},{hpt:22}];
    XLSX.utils.book_append_sheet(wb, ws, `📅 ${date}`);
  }



  // Nom du fichier : date en premier, format AAAAMMJJ
  const fmtDate = (d) => d.replace(/-/g,'');
  const fname = mode==='tout'
    ? `${fmtDate(today())}_SG_Semence.xlsx`
    : `${fmtDate(currentDate)}_SG_Semence.xlsx`;
  XLSX.writeFile(wb, fname);
}

</script>
</body>
</html>
